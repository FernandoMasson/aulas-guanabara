<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeira Tabela</title>
</head>
<style>
    body{
        background-color: bisque;
    }

    table{
        width: 300px;
        height: 300px;
        border-collapse: collapse;/*ajunta as linhas da tabela*/
    }

    tr.linha{
        background-color: aqua;
    }

    td{
        border: 1px solid black;
        padding: 5px;
        text-align: center;  /*horizontal*/
        vertical-align: bottom;  /*vertical*/
    }

    td.dado{
        background-color: blueviolet;
    }
</style>
<body>
    <H1>Primeira Tabela</H1>

    <!-- Hierarquia de Tabelas(simples)
         Table = tabela
            Table Row = linha dse tabela
                Table Header = cabeçalho de tabela
                Table Data = dado de tabela
        Caption
        <thead>
            tr.td,th
        <tbody>
            tr,td,th
        <tfoot>
            tr,td,th
    -->

    <table>
        <tr class="linha">
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>B3</td>
        </tr>
        <tr>
            <td class="dado">A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>
