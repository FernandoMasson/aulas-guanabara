<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando o iframe</title>
</head>
<!-- iframes - quadros em linha , tamanho padrão 300x150 , SCOLLING - yes , no , auto.
    Tem como colocar no dominio interno como um a pagina feita em html . ou ate mesmo outras paginas
    Pra carregar uma pagina dentro do iframe quando esta no meio da pagina , tem que ter o Name dentro do iframe , e na lista no Target , em vez de colocar o _Blank , colocar o nome que voce deu para o iframe (exemplo, iframe src="https://www.cursoemvideo.com" name="frame"> e na lista chamar o <a href="pagina extra" target="frame") com isso quando a pessoa clicar no link ele abrirá no quadrado.
 









-->
<body>
    <h1>testando o iframe </h1>
    <p>     configurando o iframe do curso em video -> <iframe src="https://www.cursoemvideo.com" frameborder="0"></iframe> </p>

</body>
</html>
